{% load static %}
{% load component_tags %}

<section id="{{ list_id }}" aria-label="{{ region_label }}">
  {% slot "filter_input" %}
    <div class="not-prose w-full">
      {% include "custom/filter-input.html" with placeholder=placeholder %}
    </div>
  {% endslot %}
  {% slot "list" default %}{% endslot %}
</section>

<script src="{% static 'hourglass/js/list.min.js' %}"></script><!-- pre-ESM -->

<script type="module">

  const listId = '{{ list_id }}'
  const valueNames = '{{ value_names }}'.split(' ')

  document.addEventListener('DOMContentLoaded', () => {

    const list = new List(listId, { valueNames: valueNames, searchDelay: 250 })
    const filterInput = document.querySelector(`#${ listId }-filter-input`)
    const cancel = document.querySelector(`#cancel-${ listId }`)

    function checkParamsForQuery() {
      const filterInput = document.querySelector(`#${ listId }-filter-input`)
      const params = new URL(document.location).searchParams
      const param = params.get(`filter-${ listId }`)
      if (param) {
        filterInput.value = param
        list.search(param)
        updateStatusMessage(null, list)
      }
    }

    function clearFilter(event) {
      filterInput.value = ''
      list.search()
      event.currentTarget.blur()
      clearStatusMessage()
    }

    function handleKeyup(event) {
      switch (event.key) {
        case 'Escape':
          clearFilter(event)
          break
      }
    }

    function updateStatusMessage(event, list) {
      const query = document.querySelector(`#${ listId }-filter-input`)?.value
      if (!query) {
        clearStatusMessage()
        return
      }
      const message = document.querySelector('#active-filter-message')
      let resultCount = list?.visibleItems.length
      if (resultCount > 1) {
        message.innerHTML = `<p>${resultCount} results for "${query}"</p>`
      } else if (resultCount == 1) {
        message.innerHTML = `<p>${resultCount} result for "${query}"</p>`
      } else {
        message.innerHTML = `<p>No results for "${query}"</p>`
      }
    }

    function clearStatusMessage() {
      const message = document.querySelector('#active-filter-message')
      message.innerHTML = `<p>No filter applied.</p>`
    }

    checkParamsForQuery()
    filterInput.addEventListener('keyup', event => handleKeyup(event, list))
    cancel.addEventListener('click', event => clearFilter(event, list))
    list.on("updated", event => updateStatusMessage(event, list))
  })
</script>
